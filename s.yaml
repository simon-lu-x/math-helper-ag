# 阿里云 Serverless Devs v3 部署配置
# 文档: https://docs.serverless-devs.com/
# 安装 CLI: npm install -g @serverless-devs/s
# 初始化凭证: s config add --AccessKeyID <ID> --AccessKeySecret <Secret>
# 部署命令: s deploy

edition: 3.0.0
name: math-helper-ag

vars:
  region: cn-hangzhou          # 可选: cn-shanghai / cn-beijing / cn-shenzhen

resources:
  ocr-function:
    component: fc3
    props:
      region: ${vars.region}
      functionName: math-helper-ocr
      description: "Math Helper OCR — Gemini 2.5 Flash backend"
      runtime: nodejs20
      # 构建产物目录（先执行 cd functions && npm run build）
      code: ./functions
      handler: lib/fc_index.handler
      timeout: 120
      memorySize: 256
      # 环境变量（敏感值建议通过 s secret 或控制台注入，而非写死在此文件）
      environmentVariables:
        GEMINI_API_KEY: ${env(GEMINI_API_KEY)}
        # QWEN_API_KEY: ${env(QWEN_API_KEY)}  # 如需服务端 Qwen 可开启
      triggers:
        - triggerType: http
          triggerName: math-helper-ocr-http
          triggerConfig:
            authType: anonymous
            methods:
              - POST
              - OPTIONS
